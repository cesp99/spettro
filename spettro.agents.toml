version = 2
default_agent = "plan"

[metadata]
name = "Spettro workspace agents"
description = "Lean orchestrator/worker setup for Spettro."

[runtime]
default_permission = "ask-first"
default_timeout_sec = 120
log_tool_calls = true
sandbox_mode = "workspace-write"

[runtime.delegation]
max_parallel_workers = 4
max_depth = 2

[[tools]]
id = "glob"
name = "Glob"
description = "Find files by name pattern."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]
aliases = []
risk_level = "low"
primary_only = false

[[tools]]
id = "grep"
name = "Grep"
description = "Search file contents with regex."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]
aliases = []
risk_level = "low"
primary_only = false

[[tools]]
id = "repo-search"
name = "Repository Search"
description = "Search file names and file contents in the current repository."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]
aliases = []
risk_level = "low"
primary_only = false

[[tools]]
id = "file-read"
name = "File Reader"
description = "Read file contents in the workspace."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read"]
aliases = []
risk_level = "low"
primary_only = false

[[tools]]
id = "file-write"
name = "File Writer"
description = "Create, update, or append files in the workspace."
kind = "builtin"
enabled = true
timeout_sec = 60
requires_approval = true
permitted_actions = ["write"]
aliases = []
risk_level = "high"
primary_only = false

[[tools]]
id = "shell-exec"
name = "Shell Executor"
description = "Run shell commands in the repository root."
kind = "builtin"
enabled = true
timeout_sec = 120
requires_approval = true
permitted_actions = ["execute", "git"]
aliases = []
risk_level = "high"
primary_only = false

[[tools]]
id = "ls"
name = "List Directory"
description = "List directory contents."
kind = "builtin"
enabled = true
timeout_sec = 10
requires_approval = false
permitted_actions = ["read", "search"]
aliases = []
risk_level = "low"
primary_only = false

[[tools]]
id = "todo-write"
name = "Todo Write"
description = "Write a list of todos to track task progress."
kind = "builtin"
enabled = true
timeout_sec = 10
requires_approval = false
permitted_actions = ["write"]
aliases = []
risk_level = "medium"
primary_only = false

[[tools]]
id = "bash"
name = "Bash"
description = "Execute a bash command and return output."
kind = "builtin"
enabled = true
timeout_sec = 120
requires_approval = true
permitted_actions = ["execute", "git"]
aliases = ["bash-output"]
risk_level = "high"
primary_only = false

[[tools]]
id = "comment"
name = "Comment"
description = "Emit a progress comment or note."
kind = "builtin"
enabled = true
timeout_sec = 5
requires_approval = false
permitted_actions = ["read"]
aliases = []
risk_level = "low"
primary_only = false

[[tools]]
id = "agent"
name = "Agent"
description = "Delegate to another agent with a structured contract."
kind = "builtin"
enabled = true
timeout_sec = 300
requires_approval = false
permitted_actions = ["read", "write", "execute", "git", "search", "plan", "ask"]
aliases = []
risk_level = "medium"
primary_only = true

[[tools]]
id = "file-edit"
name = "File Edit"
