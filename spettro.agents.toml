[[agents]]
id = "plan"
name = "Plan"
description = "Planning orchestrator that coordinates workers and todo state."
skill = "planning"
mode = "orchestrator"
role = "orchestrator"
color = "blue"
prompt_file = "agents/planning.md"
allowed_tools = ["agent", "glob", "grep", "file-read", "tool-search", "task-create", "task-get", "task-update", "task-list", "task-stop", "config", "ask-user", "enter-plan-mode", "exit-plan-mode", "send-message", "todo-write", "comment"]
permitted_actions = ["read", "search", "plan", "write"]
permission = "ask-first"
temperature = 0.2
max_tokens = 4096
max_steps = 30
handoffs = ["explore", "review", "docs"]
enabled = true

[[agents]]
id = "coding"
name = "Coding"
description = "Coding orchestrator that delegates implementation and verification."
skill = "implementation"
mode = "orchestrator"
role = "primary"
color = "green"
prompt_file = "agents/coding.md"
allowed_tools = ["agent", "glob", "grep", "file-read", "file-write", "file-edit", "shell-exec", "bash", "ls", "tool-search", "task-create", "task-get", "task-update", "task-list", "task-stop", "config", "send-message", "todo-write", "comment"]
permitted_actions = ["read", "search", "plan", "write", "execute", "git"]
permission = "restricted"
temperature = 0.1
max_tokens = 8192
max_steps = 32
handoffs = ["code", "git", "test", "review", "docs", "explore"]
enabled = true

[[agents]]
id = "ask"
name = "Ask"
description = "Read-only orchestrator for Q&A and repository questions."
skill = "conversation"
mode = "orchestrator"
role = "primary"
color = "cyan"
prompt_file = "agents/chat.md"
allowed_tools = ["agent", "glob", "grep", "file-read", "tool-search", "web-search", "mcp-list-resources", "mcp-read-resource", "comment"]
permitted_actions = ["ask", "read", "search"]
permission = "ask-first"
temperature = 0.4
max_tokens = 8192
max_steps = 12
handoffs = ["explore", "docs"]
enabled = true

[[agents]]
id = "explore"
name = "Explore"
description = "Read-only codebase exploration worker."
skill = "analysis"
mode = "worker"
role = "worker"
color = "blue"
prompt_file = "agents/explore.md"
allowed_tools = ["glob", "grep", "file-read", "ls", "comment"]
permitted_actions = ["read", "search"]
permission = "ask-first"
temperature = 0.2
max_tokens = 4096
max_steps = 24
handoffs = ["explore", "review", "docs"]
enabled = true

[[agents]]
id = "code"
name = "Code"
description = "Implementation worker that can edit files and run checks."
skill = "implementation"
mode = "worker"
role = "worker"
color = "green"
prompt_file = "agents/coding.md"
allowed_tools = ["agent", "glob", "grep", "file-read", "file-write", "file-edit", "shell-exec", "bash", "ls", "task-create", "task-get", "task-update", "task-list", "task-stop", "config", "enter-worktree", "exit-worktree", "todo-write", "comment"]
permitted_actions = ["read", "search", "write", "execute", "git"]
permission = "restricted"
temperature = 0.1
max_tokens = 8192
max_steps = 24
handoffs = ["explore", "review", "test", "docs"]
enabled = true

[[agents]]
id = "git"
name = "Git"
description = "Git workflow worker."
skill = "git"
mode = "worker"
role = "worker"
color = "yellow"
prompt_file = "agents/git.md"
allowed_tools = ["glob", "grep", "file-read", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "search", "execute", "git"]
permission = "restricted"
temperature = 0.1
max_tokens = 4096
max_steps = 20
handoffs = ["review", "docs"]
enabled = true

[[agents]]
id = "test"
name = "Test"
description = "Testing worker for verification commands."
skill = "testing"
mode = "worker"
role = "worker"
color = "yellow"
prompt_file = "agents/tester.md"
allowed_tools = ["glob", "grep", "file-read", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "search", "execute"]
permission = "restricted"
temperature = 0.1
max_tokens = 4096
max_steps = 20
handoffs = ["review", "explore"]
enabled = true

[[agents]]
id = "review"
name = "Review"
description = "Review worker for sanity checks and risk analysis."
skill = "review"
mode = "worker"
role = "subagent"
color = "red"
prompt_file = "agents/reviewer.md"
allowed_tools = ["glob", "grep", "file-read", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "search", "execute", "plan"]
permission = "ask-first"
temperature = 0.2
max_tokens = 4096
max_steps = 20
handoffs = ["explore", "docs"]
enabled = true

[[agents]]
id = "docs"
name = "Docs"
description = "Read-only docs worker for extracting and summarizing docs."
skill = "documentation"
mode = "worker"
role = "subagent"
color = "cyan"
prompt_file = "agents/docs-writer.md"
allowed_tools = ["glob", "grep", "file-read", "comment"]
permitted_actions = ["read", "search", "ask"]
permission = "ask-first"
temperature = 0.2
max_tokens = 4096
max_steps = 16
handoffs = ["explore"]
enabled = true
