version = 1
default_agent = "planning"

[metadata]
name = "Spettro workspace agents"
description = "Project-level callable agents and tools for Spettro CLI/TUI."

[runtime]
default_permission = "ask-first"
default_timeout_sec = 120
allow_network_tools = false
log_tool_calls = true

[[tools]]
id = "glob"
name = "Glob"
description = "Find files by name pattern."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]

[[tools]]
id = "grep"
name = "Grep"
description = "Search file contents with regex."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]

[[tools]]
id = "repo-search"
name = "Repository Search"
description = "Search file names and file contents in the current repository."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]

[[tools]]
id = "file-read"
name = "File Reader"
description = "Read file contents (optionally by line range) in the workspace."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read"]

[[tools]]
id = "file-write"
name = "File Writer"
description = "Create, update, or append files in the workspace."
kind = "builtin"
enabled = true
timeout_sec = 60
requires_approval = true
permitted_actions = ["write"]

[[tools]]
id = "shell-exec"
name = "Shell Executor"
description = "Run shell commands in the repository root."
kind = "builtin"
enabled = true
timeout_sec = 120
requires_approval = true
permitted_actions = ["execute", "git"]

[[tools]]
id = "ls"
name = "List Directory"
description = "List directory contents."
kind = "builtin"
enabled = true
timeout_sec = 10
requires_approval = false
permitted_actions = ["read", "search"]

[[tools]]
id = "web-fetch"
name = "Web Fetch"
description = "Fetch content from a URL."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]

[[tools]]
id = "web-search"
name = "Web Search"
description = "Search the web for information."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]

[[tools]]
id = "todo-write"
name = "Todo Write"
description = "Write a list of todos to track task progress."
kind = "builtin"
enabled = true
timeout_sec = 10
requires_approval = false
permitted_actions = ["write"]

[[tools]]
id = "bash"
name = "Bash"
description = "Execute a bash command and return output."
kind = "builtin"
enabled = true
timeout_sec = 120
requires_approval = true
permitted_actions = ["execute", "git"]

[[tools]]
id = "comment"
name = "Comment"
description = "Emit a progress comment or note."
kind = "builtin"
enabled = true
timeout_sec = 5
requires_approval = false
permitted_actions = ["read"]

[[tools]]
id = "agent"
name = "Agent"
description = "Spawn a sub-agent to handle a subtask."
kind = "builtin"
enabled = true
timeout_sec = 300
requires_approval = false
permitted_actions = ["read", "write", "execute", "git", "search", "plan", "ask"]

[[agents]]
id = "architect"
name = "Architect"
description = "Main orchestrator — delegates to specialized agents and synthesizes results."
skill = "orchestration"
mode = "custom"
color = "magenta"
model_provider = ""
model = ""
prompt_file = "agents/architect.md"
system_prompt = ""
allowed_tools = ["agent", "comment", "glob", "grep", "file-read", "todo-write"]
permitted_actions = ["read", "search", "plan", "write"]
permission = "ask-first"
temperature = 0.2
max_tokens = 8192
max_steps = 50
handoffs = ["coding", "planning", "reviewer", "tester", "debugger", "git", "docs-writer", "research", "explore", "init"]
enabled = true

[[agents]]
id = "planning"
name = "Planning Agent"
description = "Produces implementation plans and risk notes before coding."
skill = "architecture"
mode = "planning"
color = "blue"
model_provider = ""
model = ""
prompt_file = "agents/planning.md"
system_prompt = ""
allowed_tools = ["agent", "glob", "grep", "file-read"]
permitted_actions = ["read", "search", "plan"]
permission = "ask-first"
temperature = 0.2
max_tokens = 4096
max_steps = 30
handoffs = ["coding", "ask"]
enabled = true

[[agents]]
id = "coding"
name = "Coding Agent"
description = "Executes approved plans and produces code changes."
skill = "implementation"
mode = "coding"
color = "green"
model_provider = ""
model = ""
prompt_file = "agents/coding.md"
system_prompt = ""
allowed_tools = ["agent", "glob", "grep", "file-read", "file-write", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "write", "execute", "git"]
permission = "restricted"
temperature = 0.1
max_tokens = 8192
max_steps = 24
handoffs = ["planning", "ask"]
enabled = true

[[agents]]
id = "ask"
name = "Ask Agent"
description = "General assistant mode for explanation and Q&A."
skill = "conversation"
mode = "ask"
color = "cyan"
model_provider = ""
model = ""
prompt_file = "agents/chat.md"
system_prompt = ""
allowed_tools = ["agent", "glob", "grep", "file-read"]
permitted_actions = ["ask", "read", "search"]
permission = "ask-first"
temperature = 0.4
max_tokens = 8192
max_steps = 10
handoffs = ["planning", "coding"]
enabled = true

[[agents]]
id = "research"
name = "Research Agent"
description = "Investigates codebase behavior, architecture, and implementation options."
skill = "analysis"
mode = "custom"
color = "blue"
model_provider = ""
model = ""
prompt_file = "agents/research.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read"]
permitted_actions = ["read", "search", "plan"]
permission = "ask-first"
temperature = 0.3
max_tokens = 8192
max_steps = 24
handoffs = ["planning", "coding", "reviewer"]
enabled = true

[[agents]]
id = "git"
name = "Git Agent"
description = "Handles all git operations: commits, branches, PRs, history, and safe git workflows."
skill = "git"
mode = "custom"
color = "yellow"
model_provider = ""
model = ""
prompt_file = "agents/git.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "search", "execute", "git"]
permission = "restricted"
temperature = 0.1
max_tokens = 4096
max_steps = 20
handoffs = ["coding", "reviewer", "ask"]
enabled = true

[[agents]]
id = "reviewer"
name = "Code Review Agent"
description = "Reviews changes for logic, security, regressions, and missing tests."
skill = "review"
mode = "custom"
color = "red"
model_provider = ""
model = ""
prompt_file = "agents/reviewer.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "search", "execute", "plan"]
permission = "ask-first"
temperature = 0.2
max_tokens = 8192
max_steps = 20
handoffs = ["coding", "debugger", "tester"]
enabled = true

[[agents]]
id = "debugger"
name = "Debugger Agent"
description = "Reproduces failures, isolates root cause, and proposes minimal-risk fixes."
skill = "debugging"
mode = "custom"
color = "magenta"
model_provider = ""
model = ""
prompt_file = "agents/debugger.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read", "file-write", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "search", "execute", "write", "plan"]
permission = "restricted"
temperature = 0.1
max_tokens = 8192
max_steps = 28
handoffs = ["coding", "tester", "reviewer"]
enabled = true

[[agents]]
id = "tester"
name = "Testing Agent"
description = "Designs and runs focused tests, then summarizes confidence and residual risk."
skill = "testing"
mode = "custom"
color = "yellow"
model_provider = ""
model = ""
prompt_file = "agents/tester.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read", "file-write", "shell-exec", "bash", "ls", "comment"]
permitted_actions = ["read", "search", "execute", "write", "plan"]
permission = "restricted"
temperature = 0.1
max_tokens = 4096
max_steps = 24
handoffs = ["reviewer", "coding", "ask"]
enabled = true

[[agents]]
id = "docs-writer"
name = "Documentation Agent"
description = "Writes and updates technical docs, usage guides, and migration notes."
skill = "documentation"
mode = "custom"
color = "cyan"
model_provider = ""
model = ""
prompt_file = "agents/docs-writer.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read", "file-write"]
permitted_actions = ["read", "search", "write", "ask"]
permission = "ask-first"
temperature = 0.3
max_tokens = 8192
max_steps = 20
handoffs = ["reviewer", "ask", "planning"]
enabled = true

[[agents]]
id = "explore"
name = "Explore Agent"
description = "Maps and understands repository architecture, key types, and conventions. Read-only."
skill = "analysis"
mode = "custom"
color = "blue"
model_provider = ""
model = ""
prompt_file = "agents/explore.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read"]
permitted_actions = ["read", "search"]
permission = "ask-first"
temperature = 0.2
max_tokens = 8192
max_steps = 40
handoffs = ["planning", "ask"]
enabled = true

[[agents]]
id = "init"
name = "Init Agent"
description = "Analyzes a codebase and creates or improves a SPETTRO.md context file."
skill = "documentation"
mode = "custom"
color = "cyan"
model_provider = ""
model = ""
prompt_file = "agents/init.md"
system_prompt = ""
allowed_tools = ["glob", "grep", "file-read", "file-write"]
permitted_actions = ["read", "search", "write"]
permission = "ask-first"
temperature = 0.3
max_tokens = 8192
max_steps = 30
handoffs = ["planning", "ask"]
enabled = true
