version = 1
default_agent = "planning"

[metadata]
name = "Spettro workspace agents"
description = "Project-level callable agents and tools for Spettro CLI/TUI."

[runtime]
default_permission = "ask-first"
default_timeout_sec = 120
allow_network_tools = false
log_tool_calls = true

[[tools]]
id = "repo-search"
name = "Repository Search"
description = "Search file names and file contents in the current repository."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read", "search"]

[[tools]]
id = "file-read"
name = "File Reader"
description = "Read file contents (optionally by line range) in the workspace."
kind = "builtin"
enabled = true
timeout_sec = 30
requires_approval = false
permitted_actions = ["read"]

[[tools]]
id = "file-write"
name = "File Writer"
description = "Create, update, or append files in the workspace."
kind = "builtin"
enabled = true
timeout_sec = 60
requires_approval = true
permitted_actions = ["write"]

[[tools]]
id = "shell-exec"
name = "Shell Executor"
description = "Run shell commands in the repository root."
kind = "builtin"
enabled = true
timeout_sec = 120
requires_approval = true
permitted_actions = ["execute", "git"]

[[tools]]
id = "provider-chat"
name = "Provider Chat"
description = "Send prompts/images to the active model provider."
kind = "builtin"
enabled = true
timeout_sec = 120
requires_approval = false
permitted_actions = ["chat"]

[[tools]]
id = "github-mcp"
name = "GitHub MCP"
description = "Optional MCP bridge for PR/issue/workflow operations."
kind = "mcp"
enabled = false
entry_point = "mcp://github"
timeout_sec = 45
requires_approval = true
permitted_actions = ["network", "git", "read"]

[[agents]]
id = "planning"
name = "Planning Agent"
description = "Produces implementation plans and risk notes before coding."
skill = "architecture"
mode = "planning"
model_provider = ""
model = ""
prompt_file = "agents/planning.md"
system_prompt = ""
allowed_tools = ["repo-search", "file-read"]
permitted_actions = ["read", "search", "plan"]
permission = "ask-first"
temperature = 0.2
max_tokens = 4096
max_steps = 20
handoffs = ["coding", "chat"]
enabled = true

[[agents]]
id = "coding"
name = "Coding Agent"
description = "Executes approved plans and produces code changes."
skill = "implementation"
mode = "coding"
model_provider = ""
model = ""
prompt_file = "agents/coding.md"
system_prompt = ""
allowed_tools = ["repo-search", "file-read", "file-write", "shell-exec"]
permitted_actions = ["read", "write", "execute", "git"]
permission = "restricted"
temperature = 0.1
max_tokens = 8192
max_steps = 40
handoffs = ["planning", "chat"]
enabled = true

[[agents]]
id = "chat"
name = "Chat Agent"
description = "General assistant mode for explanation and Q&A."
skill = "conversation"
mode = "chat"
model_provider = ""
model = ""
prompt_file = "agents/chat.md"
system_prompt = ""
allowed_tools = ["provider-chat", "repo-search"]
permitted_actions = ["chat", "read", "search"]
permission = "ask-first"
temperature = 0.4
max_tokens = 8192
max_steps = 12
handoffs = ["planning", "coding"]
enabled = true

[[agents]]
id = "research"
name = "Research Agent"
description = "Investigates codebase behavior, architecture, and implementation options."
skill = "analysis"
mode = "custom"
model_provider = ""
model = ""
prompt_file = "agents/research.md"
system_prompt = ""
allowed_tools = ["repo-search", "provider-chat"]
permitted_actions = ["read", "search", "chat", "plan"]
permission = "ask-first"
temperature = 0.3
max_tokens = 8192
max_steps = 24
handoffs = ["planning", "coding", "reviewer"]
enabled = true

[[agents]]
id = "git-expert"
name = "Git Expert Agent"
description = "Handles branch hygiene, commit strategy, changelog-ready summaries, and safe git workflows."
skill = "git"
mode = "custom"
model_provider = ""
model = ""
prompt_file = "agents/git-expert.md"
system_prompt = ""
allowed_tools = ["repo-search", "shell-exec", "file-write", "github-mcp"]
permitted_actions = ["read", "search", "execute", "git", "write"]
permission = "restricted"
temperature = 0.1
max_tokens = 4096
max_steps = 20
handoffs = ["coding", "reviewer", "chat"]
enabled = true

[[agents]]
id = "reviewer"
name = "Code Review Agent"
description = "Reviews changes for logic, security, regressions, and missing tests."
skill = "review"
mode = "custom"
model_provider = ""
model = ""
prompt_file = "agents/reviewer.md"
system_prompt = ""
allowed_tools = ["repo-search", "shell-exec", "provider-chat"]
permitted_actions = ["read", "search", "execute", "chat", "plan"]
permission = "ask-first"
temperature = 0.2
max_tokens = 8192
max_steps = 20
handoffs = ["coding", "debugger", "tester"]
enabled = true

[[agents]]
id = "debugger"
name = "Debugger Agent"
description = "Reproduces failures, isolates root cause, and proposes minimal-risk fixes."
skill = "debugging"
mode = "custom"
model_provider = ""
model = ""
prompt_file = "agents/debugger.md"
system_prompt = ""
allowed_tools = ["repo-search", "shell-exec", "file-write"]
permitted_actions = ["read", "search", "execute", "write", "plan"]
permission = "restricted"
temperature = 0.1
max_tokens = 8192
max_steps = 28
handoffs = ["coding", "tester", "reviewer"]
enabled = true

[[agents]]
id = "tester"
name = "Testing Agent"
description = "Designs and runs focused tests, then summarizes confidence and residual risk."
skill = "testing"
mode = "custom"
model_provider = ""
model = ""
prompt_file = "agents/tester.md"
system_prompt = ""
allowed_tools = ["repo-search", "shell-exec", "file-write"]
permitted_actions = ["read", "search", "execute", "write", "plan"]
permission = "restricted"
temperature = 0.1
max_tokens = 4096
max_steps = 24
handoffs = ["reviewer", "coding", "chat"]
enabled = true

[[agents]]
id = "docs-writer"
name = "Documentation Agent"
description = "Writes and updates technical docs, usage guides, and migration notes."
skill = "documentation"
mode = "custom"
model_provider = ""
model = ""
prompt_file = "agents/docs-writer.md"
system_prompt = ""
allowed_tools = ["repo-search", "file-write", "provider-chat"]
permitted_actions = ["read", "search", "write", "chat"]
permission = "ask-first"
temperature = 0.3
max_tokens = 8192
max_steps = 20
handoffs = ["reviewer", "chat", "planning"]
enabled = true
